<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}USee — UMass Incident Reporting{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>
    <!-- Maroon banner -->
    <header class="site-banner umass-maroon text-white">
        <div class="container d-flex align-items-center justify-content-between py-3">
            <div class="d-flex align-items-center gap-3">
                <!-- Simple shield SVG logo -->
                <div class="logo-wrap">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                        aria-hidden="true">
                        <path d="M12 2L3 5v6c0 5 3.8 9.6 9 11 5.2-1.4 9-6 9-11V5l-9-3z" fill="#fff" />
                        <path d="M8 9h8v6H8z" fill="#881c1c" />
                    </svg>
                </div>
                <div>
                    <h1 class="mb-0 site-title">USee: UMass Campus Incident Reporting</h1>
                    <small class="text-muted-light">Anonymous &amp; Confidential</small>
                </div>
            </div>

            <div class="d-flex align-items-center gap-2">
                <a class="btn btn-outline-light btn-sm" href="/report">Submit Report</a>
                <a class="btn btn-outline-light btn-sm" href="/status">Check Status</a>
                <a class="btn btn-light btn-sm text-maroon" href="/admin/login">Admin Login</a>
            </div>
        </div>
    </header>

    <!-- Back to Home button area -->
    <div class="home-nav py-3">
        <div class="container">
            <!-- This button appears on all pages because base.html is extended everywhere -->
            <a class="btn btn-maroon btn-sm" href="/">Back to Home</a>
        </div>
    </div>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="container text-center py-4">
        <small class="text-muted">For immediate emergencies call Campus Police at <strong>(413) 545-2121</strong> or
            dial 911.</small>
    </footer>

    <!-- Optional JS (Bootstrap) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
